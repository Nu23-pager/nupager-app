<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NU-PAGER</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:monospace;
background:#cfcfcf;
display:flex;
justify-content:center;
margin-top:30px;
}

.pager{
width:320px;
background:#e9e9e9;
padding:12px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.title{
text-align:center;
font-size:14px;
margin-bottom:4px;
font-weight:bold;
}

.device{
text-align:center;
font-size:11px;
margin-bottom:8px;
}

.screen{
background:#a8c89c;
height:150px;
overflow:auto;
padding:6px;
border:3px inset #333;
font-size:12px;
}

input{
width:100%;
margin-top:6px;
padding:7px;
font-family:monospace;
font-size:12px;
}

button{
width:100%;
margin-top:6px;
padding:8px;
font-weight:bold;
cursor:pointer;
}

.row{
display:flex;
gap:5px;
margin-top:5px;
}

.row button{
flex:1;
}

.industrial{
background:#222;
color:white;
}

</style>
</head>

<body>

<div class="pager" id="pager">

<div class="title">
NU-PAGER MODEL NP-1999
</div>

<div class="device">
DEVICE : <span id="deviceId"></span>
</div>

<div class="screen" id="screen">
SYSTEM READY
</div>

<input id="target" placeholder="TARGET DEVICE">

<input id="message" maxlength="80" placeholder="MAX 80 CHARACTERS">

<button onclick="sendMessage()">SEND MESSAGE</button>

<div class="row">
<button onclick="read()">READ</button>
<button onclick="toggleMode()">MODE</button>
<button onclick="clearMsg()">CLR</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey:"AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",

authDomain:"nu-pager.firebaseapp.com",

databaseURL:"https://nu-pager-default-rtdb.firebaseio.com/",

projectId:"nu-pager",

storageBucket:"",

messagingSenderId:"",

appId:""

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let device=localStorage.getItem("device");

if(!device){

device="NP-"+Math.floor(Math.random()*9000+1000);

localStorage.setItem("device",device);

}

document.getElementById("deviceId").innerText=device;

let dailyCount=localStorage.getItem("count")||0;

function sendMessage(){

if(dailyCount>=50){

alert("DAILY LIMIT REACHED");

return;

}

let target=document.getElementById("target").value;

let msg=document.getElementById("message").value;

if(!msg || !target){

alert("ENTER TARGET + MESSAGE");

return;

}

let time=new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

db.ref("messages").push({

from:device,

to:target,

text:msg,

time:time

});

document.getElementById("message").value="";

dailyCount++;

localStorage.setItem("count",dailyCount);

}

function read(){

let screen=document.getElementById("screen");

db.ref("messages").limitToLast(30).on("value",snap=>{

screen.innerHTML="";

snap.forEach(d=>{

let m=d.val();

if(m.to==device || m.from==device){

screen.innerHTML+=`[${m.time}] ${m.from} : ${m.text}<br>`;

}

});

screen.scrollTop=screen.scrollHeight;

});

}

function clearMsg(){

document.getElementById("screen").innerHTML="";

}

function toggleMode(){

document.getElementById("pager").classList.toggle("industrial");

}

read();

</script>

</body>
</html>
