<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NU Pager</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

body{
background:black;
color:#00ff88;
font-family:monospace;
text-align:center;
padding:20px;
}

#screen{
background:#001a00;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px #00ff88;
height:200px;
overflow:auto;
text-align:left;
}

input{
width:80%;
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:#00ff44;
border:none;
padding:15px;
width:85%;
border-radius:10px;
font-weight:bold;
margin-top:5px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.key{
background:#333;
color:#00ff88;
padding:15px;
border-radius:10px;
}

</style>
</head>

<body>

<h2>NU-Pager</h2>

<div id="screen"></div>

<input id="name" placeholder="your name">

<input id="msg" placeholder="type message">

<button onclick="sendMsg()">SEND</button>

<div class="keypad">

<div class="key">READ</div>
<div class="key">MENU</div>
<div class="key">SELECT</div>

<div class="key">CLR</div>
<div class="key">OK</div>
<div class="key">POWER</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",
authDomain: "xxxx.firebaseapp.com",
databaseURL: "https://xxxx-default-rtdb.firebaseio.com",
projectId: "xxxx",
storageBucket: "xxxx.appspot.com",
messagingSenderId: "xxxx",
appId: "xxxx"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const screen = document.getElementById("screen");

function sendMsg(){

let name = document.getElementById("name").value;
let msg = document.getElementById("msg").value;

let time = new Date().toLocaleTimeString().slice(0,5);

db.ref("pager").push({
name:name,
msg:msg,
time:time
});

document.getElementById("msg").value="";
}

db.ref("pager").on("child_added",function(data){

let m = data.val();

let line = `[${m.time}] ${m.name}: ${m.msg}<br>`;

screen.innerHTML += line;

screen.scrollTop = screen.scrollHeight;

});

</script>

</body>
</html>
