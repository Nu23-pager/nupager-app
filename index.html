<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nu Pager</title>

<style>

body{
background:#e5e5e5;
font-family:monospace;
display:flex;
justify-content:center;
margin-top:40px;
}

#device{
width:360px;
background:#f3f3f3;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#screen{
background:#cfe6c9;
height:220px;
overflow-y:auto;
padding:10px;
font-size:14px;
border:2px solid #777;
margin-bottom:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
font-family:monospace;
}

button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

.msg{
margin-bottom:6px;
}

</style>
</head>


<body>

<div id="device">

<h3>NU-PAGER NP-1999</h3>

<div id="screen"></div>

<input id="from" placeholder="FROM">
<input id="to" placeholder="TO">
<input id="text" placeholder="type message">

<button onclick="send()">SEND</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onChildAdded
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxS Jj3durM8",
authDomain: "PASTE_AUTH_DOMAIN",
databaseURL: "PASTE_DATABASE_URL",
projectId: "PASTE_PROJECT_ID",
storageBucket: "PASTE_BUCKET",
messagingSenderId: "PASTE_ID",
appId: "PASTE_APP_ID"

};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const screen = document.getElementById("screen");

function addMessage(data){

const div = document.createElement("div");
div.className="msg";

div.innerText =
"[" + data.time + "] "
+ data.from + " → "
+ data.to + " : "
+ data.text;

screen.appendChild(div);

screen.scrollTop = screen.scrollHeight;

beep();

}

function beep(){

const ctx = new AudioContext();

const osc = ctx.createOscillator();

osc.type="square";
osc.frequency.value=900;

osc.connect(ctx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},120);

}



window.send = function(){

const from = document.getElementById("from").value;
const to = document.getElementById("to").value;
const text = document.getElementById("text").value;

const now = new Date();

const time =
now.getHours().toString().padStart(2,'0')
+ ":"
+ now.getMinutes().toString().padStart(2,'0');

push(ref(db,"messages"),{

from:from,
to:to,
text:text,
time:time

});

document.getElementById("text").value="";

};



onChildAdded(ref(db,"messages"),(snapshot)=>{

addMessage(snapshot.val());

});

</script>

</body>
</html>
