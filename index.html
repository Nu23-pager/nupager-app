<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NU Pager NP-1</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

body{
background:black;
color:#00ff88;
font-family:monospace;
text-align:center;
padding:20px;
}

#device{
background:#222;
padding:25px;
border-radius:25px;
width:320px;
margin:auto;
box-shadow:0 0 20px #000;
}

#screen{
background:#001a00;
color:#00ff88;
padding:15px;
border-radius:10px;
height:200px;
overflow:auto;
text-align:left;
box-shadow:inset 0 0 10px #00ff88;
}

#alert{
text-align:center;
margin:5px;
font-weight:bold;
}

input{
width:90%;
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#00ff44;
border:none;
padding:10px;
width:95%;
border-radius:8px;
font-weight:bold;
margin-top:5px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.key{
background:#444;
color:#00ff88;
padding:12px;
border-radius:10px;
cursor:pointer;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

.blink{
animation:blink 1s infinite;
}

</style>
</head>

<body>

<h3>NU Pager Network</h3>

<div id="device">

<div id="alert"></div>

<div id="screen"></div>

<input id="name" placeholder="your name">
<input id="msg" placeholder="type message">

<button onclick="sendMsg()">SEND</button>

<div class="keypad">

<div class="key" onclick="readMessages()">READ</div>
<div class="key" onclick="openMenu()">MENU</div>
<div class="key" onclick="selectMenu()">SELECT</div>

<div class="key">CLR</div>
<div class="key">OK</div>
<div class="key">POWER</div>

</div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",

authDomain: "xxxx.firebaseapp.com",

databaseURL: "https://xxxx-default-rtdb.firebaseio.com",

projectId: "xxxx",

storageBucket: "xxxx.appspot.com",

messagingSenderId: "xxxx",

appId: "xxxx"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const screen = document.getElementById("screen");
const alertBox = document.getElementById("alert");

function sendMsg(){

let name = document.getElementById("name").value;
let msg = document.getElementById("msg").value;

let time = new Date().toLocaleTimeString().slice(0,5);

db.ref("pager").push({

name:name,
msg:msg,
time:time

});

document.getElementById("msg").value="";

}

db.ref("pager").on("child_added",function(data){

let m = data.val();

let line = `[${m.time}] ${m.name}: ${m.msg}<br>`;

screen.innerHTML += line;

screen.scrollTop = screen.scrollHeight;

alertBox.innerHTML="NEW MESSAGE ●";

alertBox.classList.add("blink");

document.getElementById("beep").play();

});

function readMessages(){

alertBox.innerHTML="";
alertBox.classList.remove("blink");

}

function openMenu(){

screen.innerHTML=`

MENU<br><br>

1 MESSAGES<br>
2 DEVICE INFO<br>
3 CLEAR SCREEN

`;

}

function selectMenu(){

screen.innerHTML=`

DEVICE INFO<br><br>

MODEL NP-1<br>
NETWORK ONLINE<br>
NU PAGER SYSTEM

`;

}

</script>

</body>
</html>
