  <!DOCTYPE html>

<html>

<head>

  <title>NuPager</title>

</head>

<body>

<h2>NuPager Global Chat</h2>

<button id="login">Login with Google</button>

<button id="logout" style="display:none;">Logout</button>

<div id="chat" style="display:none;">

  <p id="user"></p>

  <input id="message" placeholder="พิมพ์ข้อความ..." />

  <button id="send">Send</button>

  <div id="messages"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } 

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getDatabase, ref, push, onValue } 

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",

  authDomain: "nu-pager.firebaseapp.com",

  databaseURL: "https://nu-pager-default-rtdb.firebaseio.com",

  projectId: "nu-pager",

  storageBucket: "nu-pager.firebasestorage.app",

  messagingSenderId: "1616905096",

  appId: "1:1616905096:web:a6e426d97612e523f1703d",

  measurementId: "G-MTR1HEZTMV"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("login");

const logoutBtn = document.getElementById("logout");

const chatDiv = document.getElementById("chat");

const userText = document.getElementById("user");

const sendBtn = document.getElementById("send");

const messageInput = document.getElementById("message");

const messagesDiv = document.getElementById("messages");

loginBtn.onclick = async () => {

  const result = await signInWithPopup(auth, provider);

  const user = result.user;

  loginBtn.style.display = "none";

  logoutBtn.style.display = "inline";

  chatDiv.style.display = "block";

  userText.innerText = "Logged in as: " + user.displayName;

  const messagesRef = ref(db, "global");

  onValue(messagesRef, (snapshot) => {

    messagesDiv.innerHTML = "";

    snapshot.forEach((child) => {

      const msg = child.val();

      messagesDiv.innerHTML += "<p><b>" + msg.name + ":</b> " + msg.text + "</p>";

    });

  });

  sendBtn.onclick = () => {

    const msgRef = ref(db, "global");

    push(msgRef, {

      name: user.displayName,

      text: messageInput.value

    });

    messageInput.value = "";

  };

};

logoutBtn.onclick = async () => {

  await signOut(auth);

  location.reload();

};

</script>

</body>

</html>
    
  </body>
  
</html>
