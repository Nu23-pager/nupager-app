<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NU-PAGER</title>

<style>

body{
background:#d9d9d9;
font-family:monospace;
text-align:center;
padding:20px;
}

h2{
margin-bottom:5px;
}

#userid{
margin-bottom:10px;
}

#chat{
width:100%;
max-width:420px;
height:320px;
margin:auto;
background:white;
border:2px solid black;
overflow-y:auto;
padding:10px;
}

.message{
margin:4px 0;
text-align:left;
}

input{
width:75%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
padding:10px;
font-size:16px;
}

#limit{
margin-top:10px;
}

</style>

</head>

<body>

<h2>NU-PAGER NETWORK</h2>

<div id="userid">Loading...</div>

<div id="chat"></div>

<input id="msg" maxlength="80" placeholder="Max 80 characters">

<button onclick="sendMessage()">SEND</button>

<div id="limit"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getDatabase, ref, push, onChildAdded, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"


const firebaseConfig = {

apiKey: "AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",

authDomain: "PUT_PROJECT.firebaseapp.com",

databaseURL: "https://PUT_PROJECT-default-rtdb.firebaseio.com",

projectId: "PUT_PROJECT",

storageBucket: "PUT_PROJECT.appspot.com",

messagingSenderId: "XXXX",

appId: "XXXX"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)


async function createUserID(){

let saved = localStorage.getItem("nuPagerID")

if(saved){
document.getElementById("userid").innerText = saved
return saved
}

let idRef = ref(db,"lastID")

let snap = await get(idRef)

let last = 0

if(snap.exists()){
last = snap.val()
}

let newID = last + 1

await set(idRef,newID)

let userID = "NP-" + String(newID).padStart(4,'0')

localStorage.setItem("nuPagerID",userID)

document.getElementById("userid").innerText = userID

return userID

}

let userID = await createUserID()



function canSend(){

let today = new Date().toISOString().slice(0,10)

let data = JSON.parse(localStorage.getItem("nuLimit")) || {

date: today,
count: 0

}

if(data.date !== today){

data.date = today
data.count = 0

}

if(data.count >= 50){

alert("Daily limit reached (50 messages)")
return false

}

data.count++

localStorage.setItem("nuLimit",JSON.stringify(data))

updateLimit()

return true

}



function updateLimit(){

let today = new Date().toISOString().slice(0,10)

let data = JSON.parse(localStorage.getItem("nuLimit")) || {

date: today,
count: 0

}

if(data.date !== today){

data.count = 0

}

document.getElementById("limit").innerText =
"Messages today : " + data.count + " / 50"

}

updateLimit()



window.sendMessage = function(){

if(!canSend()) return

let text = document.getElementById("msg").value

if(text.trim()=="") return

push(ref(db,"messages"),{

user:userID,
text:text,
time:Date.now()

})

document.getElementById("msg").value=""

}



onChildAdded(ref(db,"messages"),(data)=>{

let m = data.val()

let div = document.createElement("div")

div.className="message"

div.innerText = m.user + " : " + m.text

document.getElementById("chat").appendChild(div)

document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight

})


</script>

</body>
</html>
