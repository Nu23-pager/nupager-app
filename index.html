<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NuPager</title>

<style>

body{
margin:0;
background:black;
color:#00ff88;
font-family:monospace;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#pager{
width:95vw;
height:90vh;
border:4px solid #00ff88;
display:flex;
flex-direction:column;
padding:10px;
box-sizing:border-box;
}

#screen{
flex:1;
border:2px solid #00ff88;
padding:10px;
overflow:auto;
font-size:18px;
}

#controls{
margin-top:10px;
display:flex;
gap:10px;
}

button{
flex:1;
font-size:18px;
padding:10px;
background:black;
color:#00ff88;
border:2px solid #00ff88;
}

input{
width:100%;
font-size:18px;
padding:10px;
background:black;
color:#00ff88;
border:2px solid #00ff88;
}

</style>
</head>

<body>

<div id="pager">

<div id="screen">
NuPager Booting...
</div>

<input id="msg" placeholder="type message">

<div id="controls">
<button onclick="send()">SEND</button>
<button onclick="clearMsg()">CLR</button>
<button onclick="power()">POWER</button>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",
authDomain: "nu-pager.firebaseapp.com",
databaseURL: "https://nu-pager-default-rtdb.firebaseio.com",
projectId: "nu-pager",
storageBucket: "nu-pager.firebasestorage.app",
messagingSenderId: "1616905096",
appId: "1:1616905096:web:a6e426d97612e523f1703d",
measurementId: "G-MTR1HEZTMV"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let deviceID = localStorage.getItem("deviceID");

if(!deviceID){
deviceID = "DEV" + Math.floor(Math.random()*10000);
localStorage.setItem("deviceID",deviceID);
}

const screen = document.getElementById("screen");

screen.innerHTML="Device : "+deviceID+"<br>Ready...";

function beep(){
let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
audio.play();
}

window.send=function(){

let text=document.getElementById("msg").value;

push(ref(db,"messages"),{

device:deviceID,
text:text,
time:Date.now()

});

document.getElementById("msg").value="";

}

window.clearMsg=function(){
screen.innerHTML="";
}

window.power=function(){
location.reload();
}

onChildAdded(ref(db,"messages"),(data)=>{

let m=data.val();

screen.innerHTML+=
"<br>"+m.device+" : "+m.text;

beep();

});

</script>

</body>
</html>
