<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NU-PAGER Model NP-1999</title>

<style>

body{
background:#0d0d0d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:monospace;
}

.pager{
width:340px;
background:#1c1c1c;
border-radius:20px;
padding:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

.screen{
background:#0b1f0b;
color:#8aff8a;
padding:15px;
height:140px;
border-radius:10px;
overflow:auto;
font-size:14px;
box-shadow:inset 0 0 20px rgba(0,255,0,0.2);
}

.buttons{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.btn{
background:#2a2a2a;
border:none;
padding:12px;
border-radius:10px;
color:#8aff8a;
font-weight:bold;
cursor:pointer;
}

.btn:active{
background:#111;
}

.inputs{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
}

input{
padding:8px;
border:none;
border-radius:6px;
}

.send{
background:#0f3;
color:#000;
font-weight:bold;
}

</style>
</head>

<body>

<div class="pager">

<div class="screen" id="screen">

[11:28] NU: Let's start<br>
[11:29] NA: Ready at site<br>
[11:30] NU: Mon arrival OK

</div>

<div class="inputs">
<input id="name" placeholder="your name">
<input id="msg" placeholder="type message">
<button class="btn send" onclick="send()">SEND</button>
</div>

<div class="buttons">
<button class="btn">READ</button>
<button class="btn">MENU</button>
<button class="btn">SELECT</button>
<button class="btn">CLR</button>
<button class="btn">OK</button>
<button class="btn">POWER</button>
</div>

</div>

<script>

function time(){
const d = new Date()
return "[" + d.getHours().toString().padStart(2,'0')
+ ":" + d.getMinutes().toString().padStart(2,'0') + "]"
}

function send(){

const name=document.getElementById("name").value
const msg=document.getElementById("msg").value

if(msg=="") return

const screen=document.getElementById("screen")

screen.innerHTML += "<br>" + time() + " " + name + ": " + msg

screen.scrollTop=screen.scrollHeight

document.getElementById("msg").value=""

}

</script>

</body>
</html>
