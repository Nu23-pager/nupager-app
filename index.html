<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>NU PAGER NP-1999</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

body{
margin:0;
background:#111;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#device{

width:340px;
height:520px;
background:#e8e8e8;
border-radius:30px;
box-shadow:
0 0 20px #000,
inset 0 0 15px #bbb;

display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

#model{
font-size:14px;
margin-bottom:5px;
}

#deviceID{
font-size:13px;
margin-bottom:10px;
}

#screen{

width:100%;
height:220px;

background:#cfe7c9;

border-radius:10px;

padding:10px;

overflow:auto;

box-shadow:inset 0 0 10px #333;

font-size:13px;

}

#newmsg{

color:red;

font-weight:bold;

display:none;

animation:blink 1s infinite;

}

@keyframes blink{
50%{opacity:0;}
}

input{

width:95%;
padding:8px;
margin-top:6px;
border-radius:6px;
border:1px solid #999;

}

button{

width:95%;
padding:10px;
margin-top:6px;
border:none;
background:#444;
color:white;
border-radius:6px;

}

.keypad{

margin-top:15px;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:8px;

width:100%;

}

.key{

background:#666;

color:white;

padding:12px;

border-radius:8px;

text-align:center;

}

</style>

</head>

<body>

<div id="device">

<div id="model">NU-PAGER MODEL NP-1999</div>

<div id="deviceID">Loading device...</div>

<div id="newmsg">NEW MESSAGE</div>

<div id="screen"></div>

<input id="name" placeholder="your name">

<input id="to" placeholder="send to (NP-0001)">

<input id="msg" placeholder="type message">

<button onclick="sendMsg()">SEND</button>

<div class="keypad">

<div class="key">READ</div>
<div class="key">MENU</div>
<div class="key">SELECT</div>

<div class="key">CLR</div>
<div class="key">OK</div>
<div class="key">POWER</div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",

authDomain: "nu-pager.firebaseapp.com",

databaseURL: "https://nu-pager-default-rtdb.firebaseio.com",

projectId: "nu-pager",

storageBucket: "nu-pager.appspot.com",

messagingSenderId: "1616905096",

appId: "1:1616905096:web:a6e426d97612e523f1703d"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const screen = document.getElementById("screen");

const deviceIDText = document.getElementById("deviceID");

const newMsg = document.getElementById("newmsg");

let myID = localStorage.getItem("pager_id");

function generateID(){

return db.ref("serial").transaction(function(current){

if(current === null){

return 1;

}else{

return current + 1;

}

});

}

function formatID(n){

return "NP-" + String(n).padStart(4,"0");

}

if(!myID){

generateID().then(result=>{

let num = result.snapshot.val();

myID = formatID(num);

localStorage.setItem("pager_id",myID);

deviceIDText.innerText = "DEVICE : " + myID;

});

}else{

deviceIDText.innerText = "DEVICE : " + myID;

}

function sendMsg(){

let name = document.getElementById("name").value;

let msg = document.getElementById("msg").value;

let to = document.getElementById("to").value;

let time = new Date().toLocaleTimeString().slice(0,5);

db.ref("messages").push({

from:myID,

name:name,

to:to,

msg:msg,

time:time

});

document.getElementById("msg").value="";

}

db.ref("messages").on("child_added",function(data){

let m = data.val();

if(m.to === myID || m.from === myID){

let line = `[${m.time}] ${m.from} (${m.name}) : ${m.msg}<br>`;

screen.innerHTML += line;

screen.scrollTop = screen.scrollHeight;

newMsg.style.display="block";

beep();

setTimeout(()=>{

newMsg.style.display="none";

},2000);

}

});

function beep(){

let ctx = new AudioContext();

let osc = ctx.createOscillator();

osc.type="square";

osc.frequency.value=800;

osc.connect(ctx.destination);

osc.start();

setTimeout(()=>{

osc.stop();

},120);

}

</script>

</body>

</html>
