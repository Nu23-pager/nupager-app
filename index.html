<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NU-PAGER</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:monospace;
background:#dcdcdc;
display:flex;
justify-content:center;
margin-top:20px;
}

/* ตัวเครื่อง pager */

.pager{
width:92vw;
max-width:420px;
background:#f4f4f4;
padding:14px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
margin:auto;
}

/* หัวเครื่อง */

.title{
text-align:center;
font-size:16px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:2px;
}

.device{
text-align:center;
font-size:13px;
margin-bottom:10px;
}

/* หน้าจอ LCD */

.screen{
background:#9fbf8f;
height:180px;
overflow:auto;
padding:8px;
border:4px solid #222;
border-radius:6px;
font-size:13px;
line-height:1.4;
box-shadow:
inset 0 0 8px rgba(0,0,0,0.5);
}

/* ช่องกรอก */

input{
width:100%;
margin-top:6px;
padding:8px;
border-radius:6px;
border:1px solid #999;
font-family:monospace;
font-size:14px;
}

/* ปุ่ม */

button{
width:100%;
margin-top:8px;
padding:10px;
border-radius:8px;
border:none;
background:#e0e0e0;
font-weight:bold;
font-size:14px;
}

/* ปุ่มแถวล่าง */

.row{
display:flex;
gap:6px;
margin-top:6px;
}

.row button{
flex:1;
}

/* โหมด industrial */

.industrial{
background:#222;
color:white;
}

/* Samsung สีดำ */

button{
color:black;
}

/* iPhone */

@supports (-webkit-touch-callout: none) {

button{
color:#007aff;
}

}

</style>

</head>

<body>

<div class="pager" id="pager">

<div class="title">
NU-PAGER MODEL NP-1999
</div>

<div class="device">
DEVICE : <span id="deviceId"></span>
</div>

<div class="screen" id="screen">
Connecting...
</div>

<input id="target" placeholder="TARGET DEVICE (ex: NP-0002)">

<input id="message" maxlength="80" placeholder="MAX 80 CHARACTERS">

<button onclick="sendMessage()">SEND MESSAGE</button>

<div class="row">
<button onclick="read()">READ</button>
<button onclick="toggleMode()">MENU</button>
<button onclick="clearMsg()">CLR</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

/* Firebase config */

const firebaseConfig = {

apiKey:"AIzaSyCBSuoBKR6R8UNIX3u5q1_3VxSJj3durM8",

authDomain:"YOUR_PROJECT.firebaseapp.com",

databaseURL:"YOUR_DB_URL",

projectId:"YOUR_PROJECT",

storageBucket:"",

messagingSenderId:"",

appId:""

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

/* สร้าง device id */

let device=localStorage.getItem("device");

if(!device){

device="NP-"+Math.floor(Math.random()*9000+1000);

localStorage.setItem("device",device);

}

document.getElementById("deviceId").innerText=device;

/* limit message */

let dailyCount=localStorage.getItem("count")||0;

/* ส่งข้อความ */

function sendMessage(){

if(dailyCount>=50){

alert("Daily limit reached (50)");

return;

}

let target=document.getElementById("target").value.trim();

let msg=document.getElementById("message").value.trim();

if(!target || !msg){

alert("Enter target and message");

return;

}

let time=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

db.ref("messages").push({

from:device,
to:target,
text:msg,
time:time

});

document.getElementById("message").value="";

dailyCount++;

localStorage.setItem("count",dailyCount);

}

/* อ่านข้อความ */

function read(){

let screen=document.getElementById("screen");

db.ref("messages").limitToLast(50).on("value",snap=>{

screen.innerHTML="";

snap.forEach(d=>{

let m=d.val();

if(m.to===device || m.from===device){

screen.innerHTML+=`[${m.time}] ${m.from} : ${m.text}<br>`;

}

});

screen.scrollTop=screen.scrollHeight;

});

}

/* ล้างหน้าจอ */

function clearMsg(){

document.getElementById("screen").innerHTML="";

}

/* โหมดเครื่อง */

function toggleMode(){

document.getElementById("pager").classList.toggle("industrial");

}

/* โหลดข้อความ */

read();

</script>

</body>
</html>
